{% extends 'base.html' %}
{% block title %}Editar Producto — PartyShop Cartagena{% endblock %}

{% block content %}
<div class="form-container">

    <div class="editar-header">
        <h2 class="form-titulo">✏️ Editar Producto</h2>
        <a href="{{ url_for('perfil') }}" class="btn-cancelar">← Volver al perfil</a>
    </div>

    <form method="POST" enctype="multipart/form-data" class="form-producto">

        <div class="form-grupo">
            <label>Nombre del producto</label>
            <input type="text" name="nombre"
                   value="{{ producto.nombre }}"
                   required maxlength="100">
        </div>

        <div class="form-grupo">
            <label>Descripción</label>
            <textarea name="descripcion" rows="4" required>{{ producto.descripcion }}</textarea>
        </div>

        <div class="form-fila">
            <div class="form-grupo">
                <label>Precio (COP)</label>
                <input type="number" name="precio"
                       value="{{ producto.precio }}"
                       min="0" step="100" required>
            </div>
            <div class="form-grupo">
                <label>Stock disponible</label>
                <input type="number" name="stock"
                       value="{{ producto.stock }}"
                       min="0" required>
            </div>
        </div>

        <div class="form-grupo">
            <label>Categoría</label>
            <select name="categoria" required>
                {% for cat in categorias %}
                <option value="{{ cat }}"
                    {% if producto.categoria == cat %}selected{% endif %}>
                    {{ cat | capitalize }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-grupo">
            <label>Imagen del producto</label>

            <!-- Preview imagen actual -->
            <div class="imagen-preview-actual">
                <img id="preview"
                     src="{{ url_for('static', filename='images/' + producto.imagen) }}"
                     alt="Imagen actual"
                     onerror="this.src='{{ url_for('static', filename='images/default.jpg') }}'">
                <p class="imagen-label">Imagen actual</p>
            </div>

            <input type="file" name="imagen" id="input-imagen"
                   accept="image/*"
                   onchange="previsualizarImagen(this)">
            <small>Deja vacío para conservar la imagen actual.</small>
        </div>

        <div class="form-botones">
            <button type="submit" class="btn-guardar">
                💾 Guardar cambios
            </button>
            <a href="{{ url_for('perfil') }}" class="btn-cancelar-grande">
                Cancelar
            </a>
        </div>

    </form>
</div>

<style>
.form-container {
    max-width: 700px;
    margin: 2rem auto;
    background: white;
    padding: 2rem;
    border-radius: var(--radio);
    box-shadow: var(--sombra);
}

.editar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
}

.form-titulo { color: var(--primario); font-size: 1.5rem; }

.form-producto { display: flex; flex-direction: column; gap: 1.2rem; }

.form-grupo { display: flex; flex-direction: column; gap: 0.4rem; }
.form-grupo label { font-weight: 600; font-size: 0.9rem; color: var(--oscuro); }

.form-grupo input,
.form-grupo textarea,
.form-grupo select {
    padding: 0.7rem 1rem;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-family: 'Poppins', sans-serif;
    font-size: 0.95rem;
    transition: var(--transicion);
    outline: none;
    background: white;
}

.form-grupo input:focus,
.form-grupo textarea:focus,
.form-grupo select:focus { border-color: var(--primario); }

.form-grupo small { color: #aaa; font-size: 0.78rem; }

.form-fila { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

/* Preview imagen */
.imagen-preview-actual {
    margin-bottom: 0.8rem;
    text-align: center;
}

.imagen-preview-actual img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 12px;
    border: 3px solid #e0e0e0;
}

.imagen-label { font-size: 0.78rem; color: #aaa; margin-top: 0.3rem; }

/* Botones */
.form-botones {
    display: flex;
    gap: 1rem;
    margin-top: 0.5rem;
}

.btn-guardar {
    flex: 1;
    padding: 0.9rem;
    background: linear-gradient(135deg, var(--primario), #FF8E53);
    color: white;
    border: none;
    border-radius: var(--radio);
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: var(--transicion);
}

.btn-guardar:hover { transform: translateY(-2px); filter: brightness(1.1); }

.btn-cancelar-grande {
    flex: 1;
    padding: 0.9rem;
    background: #f0f0f0;
    color: var(--oscuro);
    border-radius: var(--radio);
    text-decoration: none;
    font-weight: 700;
    font-size: 1rem;
    text-align: center;
    transition: var(--transicion);
}

.btn-cancelar-grande:hover { background: #e0e0e0; }

.btn-cancelar {
    padding: 0.5rem 1rem;
    background: #f0f0f0;
    color: var(--oscuro);
    border-radius: var(--radio);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    transition: var(--transicion);
}

.btn-cancelar:hover { background: #e0e0e0; }

@media (max-width: 600px) {
    .form-fila    { grid-template-columns: 1fr; }
    .form-botones { flex-direction: column; }
    .editar-header { flex-direction: column; }
}
</style>

<script>
function previsualizarImagen(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function (e) {
            document.getElementById('preview').src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
