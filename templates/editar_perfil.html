{% extends 'base.html' %}
{% block title %}Editar Perfil — FiestaShop{% endblock %}

{% block content %}
<div class="form-container">

    <div class="editar-header">
        <h2 class="form-titulo">⚙️ Editar Perfil</h2>
        <a href="{{ url_for('perfil') }}" class="btn-cancelar">← Volver al perfil</a>
    </div>

    <form method="POST" class="form-producto">

        <!-- Datos personales -->
        <div class="seccion-form">
            <h3>👤 Datos personales</h3>

            <div class="form-grupo">
                <label>Nombre completo</label>
                <input type="text" name="nombre"
                       value="{{ current_user.nombre }}"
                       required maxlength="100">
            </div>

            <div class="form-grupo">
                <label>Correo electrónico</label>
                <input type="email"
                       value="{{ current_user.email }}"
                       disabled
                       title="El correo no se puede cambiar">
                <small>⚠️ El correo no puede modificarse.</small>
            </div>

            <div class="form-grupo">
                <label>Bio / Descripción del vendedor</label>
                <textarea name="bio" rows="3"
                          placeholder="Cuéntanos sobre ti o tu tienda...">{{ current_user.bio or '' }}</textarea>
            </div>
        </div>

        <!-- Cambiar contraseña -->
        <div class="seccion-form">
            <h3>🔒 Cambiar contraseña <span style="font-size:0.8rem; color:#aaa;">(opcional)</span></h3>

            <div class="form-grupo">
                <label>Contraseña actual</label>
                <input type="password" name="password_actual"
                       placeholder="Ingresa tu contraseña actual">
            </div>

            <div class="form-fila">
                <div class="form-grupo">
                    <label>Nueva contraseña</label>
                    <input type="password" name="password_nuevo"
                           id="pass_nuevo"
                           placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-grupo">
                    <label>Confirmar nueva contraseña</label>
                    <input type="password" name="password_confirmar"
                           id="pass_confirmar"
                           placeholder="Repite la nueva contraseña">
                    <small id="msg-pass" style="color:red;"></small>
                </div>
            </div>
        </div>

        <div class="form-botones">
            <button type="submit" class="btn-guardar" id="btn-guardar">
                💾 Guardar cambios
            </button>
        </div>

    </form>
</div>

<style>
.form-container {
    max-width: 700px;
    margin: 2rem auto;
    background: white;
    padding: 2rem;
    border-radius: var(--radio);
    box-shadow: var(--sombra);
}

.editar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
}

.form-titulo { color: var(--primario); font-size: 1.5rem; }

.seccion-form {
    background: var(--gris);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
}

.seccion-form h3 {
    font-size: 1rem;
    margin-bottom: 1.2rem;
    color: var(--oscuro);
    padding-bottom: 0.5rem;
    border-bottom: 2px solid #e0e0e0;
}

.form-producto { display: flex; flex-direction: column; gap: 0; }

.form-grupo { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
.form-grupo label { font-weight: 600; font-size: 0.9rem; color: var(--oscuro); }

.form-grupo input,
.form-grupo textarea {
    padding: 0.7rem 1rem;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-family: 'Poppins', sans-serif;
    font-size: 0.95rem;
    transition: var(--transicion);
    outline: none;
    background: white;
}

.form-grupo input:focus,
.form-grupo textarea:focus { border-color: var(--primario); }

.form-grupo input:disabled {
    background: #f5f5f5;
    cursor: not-allowed;
    color: #aaa;
}

.form-grupo small { color: #aaa; font-size: 0.78rem; }

.form-fila { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

.form-botones { margin-top: 0.5rem; }

.btn-guardar {
    width: 100%;
    padding: 0.9rem;
    background: linear-gradient(135deg, var(--primario), #FF8E53);
    color: white;
    border: none;
    border-radius: var(--radio);
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: var(--transicion);
}

.btn-guardar:hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn-guardar:disabled { background: #ccc; cursor: not-allowed; transform: none; }

.btn-cancelar {
    padding: 0.5rem 1rem;
    background: #f0f0f0;
    color: var(--oscuro);
    border-radius: var(--radio);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    transition: var(--transicion);
}

.btn-cancelar:hover { background: #e0e0e0; }

@media (max-width: 600px) {
    .form-fila { grid-template-columns: 1fr; }
    .editar-header { flex-direction: column; }
}
</style>

<script>
document.getElementById('pass_confirmar').addEventListener('input', function () {
    const nuevo     = document.getElementById('pass_nuevo').value;
    const confirmar = this.value;
    const msg       = document.getElementById('msg-pass');
    const btn       = document.getElementById('btn-guardar');

    if (confirmar && nuevo !== confirmar) {
        msg.textContent = '❌ Las contraseñas no coinciden';
        btn.disabled = true;
    } else {
        msg.textContent = '';
        btn.disabled = false;
    }
});
</script>
{% endblock %}
