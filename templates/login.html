{% extends 'base.html' %}
{% block title %}Iniciar Sesión — FiestaShop{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>🎊 Bienvenido de vuelta</h2>
            <p>Inicia sesión para gestionar tus productos</p>
        </div>

        <form method="POST" class="auth-form">

            <div class="form-grupo">
                <label>Correo electrónico</label>
                <input type="email" name="email" placeholder="tu@correo.com"
                       required autocomplete="email">
            </div>

            <div class="form-grupo">
                <label>Contraseña</label>
                <div class="input-password">
                    <input type="password" name="password" id="password"
                           placeholder="••••••••" required>
                    <button type="button" onclick="togglePassword()"
                            class="toggle-pass">👁️</button>
                </div>
            </div>

            <div class="form-check">
                <input type="checkbox" name="recordar" id="recordar">
                <label for="recordar">Recordarme</label>
            </div>

            <button type="submit" class="btn-auth">
                Iniciar Sesión
            </button>

        </form>

        <div class="auth-footer">
            <p>¿No tienes cuenta?
                <a href="{{ url_for('registro') }}">Regístrate gratis</a>
            </p>
        </div>
    </div>
</div>

<style>
.auth-container {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
}

.auth-card {
    background: white;
    border-radius: var(--radio);
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--sombra);
}

.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}

.auth-header h2 {
    font-size: 1.6rem;
    color: var(--oscuro);
    margin-bottom: 0.5rem;
}

.auth-header p { color: #999; font-size: 0.9rem; }

.auth-form {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
}

.form-grupo {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
}

.form-grupo label { font-weight: 600; font-size: 0.9rem; }

.form-grupo input,
.input-password input {
    padding: 0.75rem 1rem;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-family: 'Poppins', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: var(--transicion);
    width: 100%;
}

.form-grupo input:focus,
.input-password input:focus { border-color: var(--primario); }

.input-password {
    position: relative;
    display: flex;
}

.toggle-pass {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
}

.form-check {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.9rem;
}

.btn-auth {
    padding: 0.85rem;
    background: linear-gradient(135deg, var(--primario), #FF8E53);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Poppins', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transicion);
}

.btn-auth:hover { transform: translateY(-2px); filter: brightness(1.1); }

.auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.9rem;
    color: #666;
}

.auth-footer a { color: var(--primario); font-weight: 600; text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }
</style>

<script>
function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
