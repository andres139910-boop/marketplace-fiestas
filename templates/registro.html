{% extends 'base.html' %}
{% block title %}Registro — FiestaShop{% endblock %}

{% block content %}
<div class="auth-container">

    <div class="auth-card">

        <div class="auth-header">
            <div class="auth-logo">🎊</div>
            <h2>Crear cuenta</h2>
            <p>Únete a FiestaShop y empieza a vender</p>
        </div>

        <form method="POST" class="auth-form">

            <div class="form-grupo">
                <label>Nombre completo</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" name="nombre"
                           placeholder="Tu nombre completo"
                           required maxlength="100"
                           autofocus>
                </div>
            </div>

            <div class="form-grupo">
                <label>Correo electrónico</label>
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email"
                           placeholder="tucorreo@gmail.com"
                           required>
                </div>
            </div>

            <div class="form-grupo">
                <label>Contraseña</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password"
                           id="password"
                           placeholder="Mínimo 6 caracteres"
                           required minlength="6">
                </div>
            </div>

            <div class="form-grupo">
                <label>Confirmar contraseña</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="confirmar"
                           id="confirmar"
                           placeholder="Repite tu contraseña"
                           required>
                </div>
                <small id="msg-pass" style="color:red;"></small>
            </div>

            <button type="submit" class="btn-auth" id="btn-registro">
                Crear cuenta 🎉
            </button>

        </form>

        <div class="auth-footer">
            <p>¿Ya tienes cuenta?
                <a href="{{ url_for('login') }}">Iniciar sesión</a>
            </p>
        </div>

    </div>
</div>

<style>
.auth-container {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
}

.auth-card {
    background: white;
    border-radius: var(--radio);
    padding: 2.5rem;
    width: 100%;
    max-width: 440px;
    box-shadow: var(--sombra);
}

.auth-header { text-align: center; margin-bottom: 2rem; }
.auth-logo   { font-size: 3rem; margin-bottom: 0.5rem; }
.auth-header h2 { font-size: 1.6rem; color: var(--oscuro); margin-bottom: 0.3rem; }
.auth-header p  { color: #999; font-size: 0.9rem; }

.auth-form { display: flex; flex-direction: column; gap: 1.2rem; }

.form-grupo { display: flex; flex-direction: column; gap: 0.4rem; }
.form-grupo label { font-weight: 600; font-size: 0.9rem; color: var(--oscuro); }
.form-grupo small { font-size: 0.78rem; }

.input-icon {
    position: relative;
    display: flex;
    align-items: center;
}

.input-icon i {
    position: absolute;
    left: 14px;
    color: #aaa;
    font-size: 0.9rem;
}

.input-icon input {
    width: 100%;
    padding: 0.75rem 1rem 0.75rem 2.5rem;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-family: 'Poppins', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: var(--transicion);
}

.input-icon input:focus { border-color: var(--primario); }

.btn-auth {
    width: 100%;
    padding: 0.9rem;
    background: linear-gradient(135deg, var(--primario), #FF8E53);
    color: white;
    border: none;
    border-radius: var(--radio);
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: var(--transicion);
    margin-top: 0.5rem;
}

.btn-auth:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
.btn-auth:disabled { background: #ccc; cursor: not-allowed; }

.auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.9rem;
    color: #999;
}

.auth-footer a { color: var(--primario); font-weight: 600; text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }
</style>

<script>
document.getElementById('confirmar').addEventListener('input', function () {
    const pass     = document.getElementById('password').value;
    const confirmar = this.value;
    const msg      = document.getElementById('msg-pass');
    const btn      = document.getElementById('btn-registro');

    if (confirmar && pass !== confirmar) {
        msg.textContent  = '❌ Las contraseñas no coinciden';
        btn.disabled     = true;
    } else {
        msg.textContent  = '';
        btn.disabled     = false;
    }
});
</script>
{% endblock %}
